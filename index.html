<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal SEHATI-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Transisi halus untuk iframe */
        #app-frame { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-slate-50 overflow-hidden">

    <nav class="bg-white border-b border-slate-200 shadow-sm z-50 flex-shrink-0 relative">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-teal-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-sm">
                        S
                    </div>
                    <div>
                        <span class="font-extrabold text-xl text-slate-800 tracking-tight block leading-none">SEHATI-AI</span>
                        <span class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Sistem Akreditasi</span>
                    </div>
                </div>

                <div class="flex space-x-2 sm:space-x-4">
                    <button onclick="switchApp('siap', 'https://alfan-23.github.io/SIAP-SUB-SEHATI/')" id="btn-siap" 
                        class="flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-teal-600 text-white shadow-sm hover:bg-teal-700 transition-all border border-transparent">
                        <span class="text-lg mr-2">🏥</span> SIAP
                    </button>

                    <button onclick="switchApp('ilp', 'https://alfan-23.github.io/SIAP-Versi-ILP/')" id="btn-ilp" 
                        class="flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-white text-slate-600 hover:bg-slate-100 transition-all border border-slate-200 shadow-sm">
                        <span class="text-lg mr-2">📊</span> MAPING ILP
                    </button>
                </div>
                
            </div>
        </div>
        
        <div id="loading-bar" class="absolute bottom-0 left-0 h-1 bg-teal-500 w-0 transition-all duration-300"></div>
    </nav>

    <div class="flex-1 w-full bg-slate-100 relative">
        
        <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-0">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-teal-600 mb-4"></div>
            <p class="text-slate-500 font-medium text-sm animate-pulse">Memuat Aplikasi...</p>
        </div>
        
        <iframe 
            id="app-frame" 
            src="https://alfan-23.github.io/SIAP-SUB-SEHATI/" 
            class="w-full h-full border-none relative z-10 opacity-0" 
            onload="hideLoader()"
            title="SEHATI-AI App Frame">
        </iframe>
    </div>

    <script>
        // Fungsi untuk mengganti aplikasi yang ditampilkan di Iframe
        function switchApp(appId, url) {
            const frame = document.getElementById('app-frame');
            const loader = document.getElementById('loader');
            const loadingBar = document.getElementById('loading-bar');
            
            // Tampilkan loader dan sembunyikan frame sementara
            loader.style.display = 'flex';
            frame.classList.add('opacity-0');
            loadingBar.style.width = '30%';
            
            // Ubah URL iframe ke link GitHub Pages yang diminta
            frame.src = url;

            // Reset desain semua tombol kembali ke default (tidak aktif)
            const btnSiap = document.getElementById('btn-siap');
            const btnIlp = document.getElementById('btn-ilp');
            
            // Reset Tombol SIAP
            btnSiap.className = 'flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-white text-slate-600 hover:bg-slate-100 transition-all border border-slate-200 shadow-sm';
            // Reset Tombol ILP
            btnIlp.className = 'flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-white text-slate-600 hover:bg-slate-100 transition-all border border-slate-200 shadow-sm';

            // Beri warna khusus untuk tombol yang sedang AKTIF
            const activeBtn = document.getElementById('btn-' + appId);
            if (appId === 'siap') {
                activeBtn.className = 'flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-teal-600 text-white shadow-sm hover:bg-teal-700 transition-all border border-transparent';
                loadingBar.className = 'absolute bottom-0 left-0 h-1 bg-teal-500 w-30 transition-all duration-300';
            } else if (appId === 'ilp') {
                activeBtn.className = 'flex items-center px-4 py-2 rounded-lg text-sm font-bold bg-indigo-600 text-white shadow-sm hover:bg-indigo-700 transition-all border border-transparent';
                loadingBar.className = 'absolute bottom-0 left-0 h-1 bg-indigo-500 w-30 transition-all duration-300';
            }
        }

        // Fungsi dipanggil otomatis oleh iframe ketika halaman URL selesai dimuat
        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app-frame').classList.remove('opacity-0');
            
            // Selesaikan animasi loading bar
            const loadingBar = document.getElementById('loading-bar');
            loadingBar.style.width = '100%';
            setTimeout(() => {
                loadingBar.style.opacity = '0';
                setTimeout(() => {
                    loadingBar.style.width = '0%';
                    loadingBar.style.opacity = '1';
                }, 300);
            }, 500);
        }
    </script>
</body>
</html>
